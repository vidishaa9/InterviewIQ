spring.application.name=InterviewIQ

server.port=8089

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/interviewiq
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# JWT — THIS WAS MISSING, THAT'S YOUR ERROR
# ==========================================
app.jwt.secret=interviewiq-super-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration=86400000

# ==========================================
# GEMINI AI
# ==========================================
app.gemini.api-key=YOUR_GEMINI_API_KEY_HERE
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/resumes

# ==========================================
# FLYWAY
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.springframework.boot.context.config=TRACE
